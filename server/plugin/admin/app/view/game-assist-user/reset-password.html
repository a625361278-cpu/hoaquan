<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8">
        <title>重置密码</title>
        <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css" />
        <link rel="stylesheet" href="/app/admin/admin/css/reset.css" />
    </head>
    <body>
        <form class="layui-form">
            <div class="mainBox">
                <div class="main-container mr-5">
                    <div class="layui-form-item">
                        <label class="layui-form-label required">新密码</label>
                        <div class="layui-input-block">
                            <input type="password" name="password" required lay-verify="required" class="layui-input" autocomplete="new-password">
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom">
                <div class="button-container">
                    <button type="submit" class="pear-btn pear-btn-primary pear-btn-md" lay-submit lay-filter="save">提交</button>
                </div>
            </div>
        </form>

        <script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
        <script src="/app/admin/component/pear/pear.js"></script>
        <script src="/app/admin/admin/js/permission.js"></script>
        <script>
            const RESET_PASSWORD_API = "/app/admin/game-assist-user/reset-password";

            layui.use(["form", "popup"], function () {
                layui.form.on("submit(save)", function (data) {
                    data.field.id = layui.url().search.id;
                    layui.$.ajax({
                        url: RESET_PASSWORD_API,
                        type: "POST",
                        dataType: "json",
                        data: data.field,
                        success: function (res) {
                            if (res.code) {
                                return layui.popup.failure(res.msg);
                            }
                            return layui.popup.success("操作成功", function () {
                                parent.layer.close(parent.layer.getFrameIndex(window.name));
                            });
                        }
                    });
                    return false;
                });
            });
        </script>
    </body>
</html>
