<!DOCTYPE html>
<html lang="<?=admin_html_lang()?>">
    <head>
        <meta charset="utf-8">
        <title><?=admin_t('admin.third_party_config.title')?></title>
        <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css" />
        <link rel="stylesheet" href="/app/admin/admin/css/reset.css" />
        <style>
            .config-card {
                max-width: 880px;
            }
            .form-help {
                margin-top: 6px;
                color: #6b7280;
                font-size: 12px;
                line-height: 1.5;
            }
            .readonly-url {
                margin-top: 10px;
                padding: 10px 12px;
                border-radius: 4px;
                background: #f7f8fa;
                color: #1f2937;
                word-break: break-all;
            }
        </style>
    </head>
    <body class="pear-container">
        <div class="layui-card config-card">
            <div class="layui-card-body">
                <form class="layui-form" lay-filter="third-party-config-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.enabled')?></label>
                        <div class="layui-input-block">
                            <input type="checkbox" name="third_party_enabled" value="1" lay-skin="switch" lay-text="ON|OFF">
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.script_ws_url')?></label>
                        <div class="layui-input-block">
                            <input type="text" name="third_party_script_ws_url" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.third_party_config.script_ws_url_help')?></div>
                            <div id="script-full-url" class="readonly-url"></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.game_account_max_count')?></label>
                        <div class="layui-input-block">
                            <input type="number" name="game_account_max_count" min="1" max="100" step="1" required lay-verify="required|number" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.third_party_config.game_account_max_count_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.facebook_login_enabled')?></label>
                        <div class="layui-input-block">
                            <input type="checkbox" name="facebook_login_enabled" value="1" lay-skin="switch" lay-text="ON|OFF">
                            <div class="form-help"><?=admin_t('admin.third_party_config.social_login_enabled_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.google_login_enabled')?></label>
                        <div class="layui-input-block">
                            <input type="checkbox" name="google_login_enabled" value="1" lay-skin="switch" lay-text="ON|OFF">
                            <div class="form-help"><?=admin_t('admin.third_party_config.social_login_enabled_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.script_token')?></label>
                        <div class="layui-input-block">
                            <input type="text" name="third_party_script_token" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.third_party_config.script_token_help')?></div>
                            <input type="hidden" name="reset_script_token" value="0">
                            <button type="button" id="reset-token" class="pear-btn pear-btn-warming pear-btn-sm" style="margin-top:8px;">
                                <?=admin_t('admin.third_party_config.reset_script_token')?>
                            </button>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.third_party_config.sign_secret')?></label>
                        <div class="layui-input-block">
                            <input type="text" name="third_party_sign_secret" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.third_party_config.sign_secret_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="pear-btn pear-btn-primary" lay-submit lay-filter="save-config">
                                <i class="layui-icon layui-icon-ok"></i><?=admin_t('admin.third_party_config.save')?>
                            </button>
                            <a class="pear-btn" href="/app/admin/game-assist-third-party-connection/index">
                                <i class="layui-icon layui-icon-link"></i><?=admin_t('admin.third_party_config.connection_link')?>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
        <script src="/app/admin/component/pear/pear.js"></script>
        <script src="/app/admin/admin/js/permission.js"></script>
        <script src="/app/admin/admin/js/common.js"></script>
        <script>
            const GET_API = "/app/admin/game-assist-third-party-config/get";
            const SAVE_API = "/app/admin/game-assist-third-party-config/save";

            layui.use(["form", "popup"], function() {
                let form = layui.form;
                let $ = layui.$;

                loadConfig();

                $("#reset-token").on("click", function() {
                    $("input[name=reset_script_token]").val("1");
                    layui.popup.success("<?=admin_t('admin.third_party_config.reset_script_token_pending')?>");
                });

                form.on("submit(save-config)", function(data) {
                    $.post(SAVE_API, data.field, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        $("input[name=reset_script_token]").val("0");
                        layui.popup.success("<?=admin_t('admin.common.operation_success')?>", loadConfig);
                    });
                    return false;
                });

                function loadConfig() {
                    $.get(GET_API, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        form.val("third-party-config-form", {
                            third_party_enabled: res.data.enabled ? "1" : "",
                            third_party_script_ws_url: res.data.script_ws_url || "",
                            third_party_script_token: res.data.script_token || "",
                            third_party_sign_secret: res.data.sign_secret || "",
                            game_account_max_count: res.data.game_account_max_count || 3,
                            facebook_login_enabled: res.data.facebook_login_enabled ? "1" : "",
                            google_login_enabled: res.data.google_login_enabled ? "1" : ""
                        });
                        $("#script-full-url").text(res.data.script_full_url || "");
                        form.render();
                    });
                }
            });
        </script>
    </body>
</html>
