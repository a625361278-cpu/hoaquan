<!DOCTYPE html>
<html lang="<?=admin_html_lang()?>">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title><?=admin_t('admin.game_config_visibility.title')?></title>
        <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css" />
        <link rel="stylesheet" href="/app/admin/admin/css/reset.css" />
        <style>
            :root { --primary: #1677ff; --border: #e5e7eb; --muted: #64748b; --surface: #f8fafc; }
            * { box-sizing: border-box; }
            body { color: #172033; }
            button, input { font: inherit; }
            .visibility-card { max-width: 1180px; margin: 0 auto; }
            .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 18px; }
            .page-title { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
            .page-subtitle { margin: 0; color: var(--muted); line-height: 1.6; }
            .summary { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
            .summary-pill { min-width: 86px; padding: 8px 12px; border-radius: 999px; background: #eef6ff; color: #135ca8; text-align: center; font-weight: 600; }
            .summary-pill.hidden { background: #f1f5f9; color: #475569; }
            .notice { margin-bottom: 18px; padding: 13px 15px; border: 1px solid #fed7aa; border-radius: 8px; background: #fff7ed; color: #9a3412; line-height: 1.6; }
            .toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) auto; align-items: center; gap: 12px; margin-bottom: 14px; }
            .search-wrap { position: relative; max-width: 480px; }
            .search-input { width: 100%; height: 40px; padding: 0 38px 0 13px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
            .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(22,119,255,.12); }
            .search-icon { position: absolute; right: 13px; top: 10px; color: #94a3b8; pointer-events: none; }
            .bulk-actions { display: flex; gap: 8px; }
            .action-button { min-height: 38px; padding: 0 14px; border: 1px solid #cbd5e1; border-radius: 7px; background: #fff; color: #334155; cursor: pointer; }
            .action-button:hover { border-color: #8ab9ff; color: #0f62bd; }
            .action-button.danger:hover { border-color: #fca5a5; color: #b91c1c; }
            .action-button:focus-visible, .tab-button:focus-visible, .group-action:focus-visible, .save-button:focus-visible { outline: 3px solid rgba(22,119,255,.25); outline-offset: 2px; }
            .tab-list { display: flex; gap: 6px; overflow-x: auto; margin: 0 0 16px; padding: 4px 2px 8px; scrollbar-width: thin; }
            .tab-button { min-width: 92px; min-height: 40px; padding: 0 16px; border: 0; border-radius: 8px; background: #f1f5f9; color: #475569; cursor: pointer; white-space: nowrap; }
            .tab-button.active { background: var(--primary); color: #fff; box-shadow: 0 6px 16px rgba(22,119,255,.2); }
            .group-card { margin-bottom: 14px; overflow: hidden; border: 1px solid var(--border); border-radius: 10px; background: #fff; }
            .group-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 52px; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
            .group-title-wrap { display: flex; align-items: center; gap: 9px; min-width: 0; }
            .group-title { font-size: 15px; font-weight: 700; }
            .group-count { color: var(--muted); font-size: 12px; white-space: nowrap; }
            .group-actions { display: flex; gap: 6px; }
            .group-action { min-height: 30px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #475569; cursor: pointer; }
            .item-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .item-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; min-height: 66px; padding: 11px 14px; border-bottom: 1px solid #eef2f7; }
            .item-row:nth-child(odd) { border-right: 1px solid #eef2f7; }
            .item-main { min-width: 0; }
            .item-label { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; font-weight: 600; }
            .default-hidden { padding: 2px 7px; border-radius: 999px; background: #fff1f2; color: #be123c; font-size: 11px; font-weight: 600; }
            .item-path { display: block; overflow: hidden; color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
            .switch { position: relative; display: inline-flex; width: 46px; height: 26px; flex: 0 0 46px; }
            .switch input { width: 1px; height: 1px; margin: 0; opacity: 0; }
            .switch-track { position: absolute; inset: 0; border-radius: 999px; background: #cbd5e1; cursor: pointer; transition: background .18s ease; }
            .switch-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(15,23,42,.25); transition: transform .18s ease; }
            .switch input:checked + .switch-track { background: var(--primary); }
            .switch input:checked + .switch-track::after { transform: translateX(20px); }
            .switch input:focus-visible + .switch-track { outline: 3px solid rgba(22,119,255,.25); outline-offset: 2px; }
            .empty { padding: 48px 20px; border: 1px dashed #cbd5e1; border-radius: 10px; color: var(--muted); text-align: center; }
            .footer-actions { position: sticky; bottom: 0; display: flex; justify-content: flex-end; margin: 18px -15px -15px; padding: 14px 15px; border-top: 1px solid var(--border); background: rgba(255,255,255,.94); backdrop-filter: blur(8px); }
            .save-button { min-width: 132px; min-height: 42px; border: 0; border-radius: 8px; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 7px 18px rgba(22,119,255,.22); }
            .save-button:disabled { cursor: not-allowed; opacity: .55; }
            @media (max-width: 760px) {
                .pear-container { padding: 10px; }
                .page-head { display: block; }
                .summary { justify-content: flex-start; margin-top: 12px; }
                .toolbar { grid-template-columns: 1fr; }
                .search-wrap { max-width: none; }
                .bulk-actions { display: grid; grid-template-columns: 1fr 1fr; }
                .item-grid { grid-template-columns: 1fr; }
                .item-row:nth-child(odd) { border-right: 0; }
                .group-head { align-items: flex-start; flex-direction: column; }
                .group-actions { width: 100%; }
                .group-action { flex: 1; }
                .save-button { width: 100%; min-width: 0; height: auto; min-height: 42px; padding: 8px 12px; line-height: 1.35; white-space: normal; }
            }
        </style>
    </head>
    <body class="pear-container">
        <div class="layui-card visibility-card">
            <div class="layui-card-body">
                <div class="page-head">
                    <div>
                        <h1 class="page-title"><?=admin_t('admin.game_config_visibility.title')?></h1>
                        <p class="page-subtitle"><?=admin_t('admin.game_config_visibility.subtitle')?></p>
                    </div>
                    <div class="summary" aria-live="polite">
                        <span id="visible-summary" class="summary-pill"></span>
                        <span id="hidden-summary" class="summary-pill hidden"></span>
                    </div>
                </div>

                <div class="notice"><?=admin_t('admin.game_config_visibility.notice')?></div>

                <div class="toolbar">
                    <div class="search-wrap">
                        <input id="visibility-search" class="search-input" type="search" autocomplete="off" placeholder="<?=admin_t('admin.game_config_visibility.search_placeholder')?>" aria-label="<?=admin_t('admin.game_config_visibility.search_placeholder')?>">
                        <span class="search-icon" aria-hidden="true">⌕</span>
                    </div>
                    <div class="bulk-actions">
                        <button id="show-tab" type="button" class="action-button"><?=admin_t('admin.game_config_visibility.show_current_tab')?></button>
                        <button id="hide-tab" type="button" class="action-button danger"><?=admin_t('admin.game_config_visibility.hide_current_tab')?></button>
                    </div>
                </div>

                <div id="tab-list" class="tab-list" role="tablist" aria-label="<?=admin_t('admin.game_config_visibility.title')?>"></div>
                <div id="config-panel" aria-live="polite"></div>

                <div class="footer-actions">
                    <button id="save-config" type="button" class="save-button"><?=admin_t('admin.game_config_visibility.save')?></button>
                </div>
            </div>
        </div>

        <script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
        <script src="/app/admin/component/pear/pear.js"></script>
        <script src="/app/admin/admin/js/permission.js"></script>
        <script>
            const GET_API = "/app/admin/game-assist-config-visibility/get";
            const SAVE_API = "/app/admin/game-assist-config-visibility/save";
            const TEXT = <?=json_encode([
                'visible' => admin_t('admin.game_config_visibility.visible'),
                'hidden' => admin_t('admin.game_config_visibility.hidden'),
                'show_all' => admin_t('admin.game_config_visibility.show_all'),
                'hide_all' => admin_t('admin.game_config_visibility.hide_all'),
                'default_hidden' => admin_t('admin.game_config_visibility.default_hidden'),
                'empty_search' => admin_t('admin.game_config_visibility.empty_search'),
                'operation_success' => admin_t('admin.common.operation_success'),
            ], JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES)?>;

            layui.use(["popup"], function() {
                const $ = layui.$;
                let catalog = null;
                let activeTab = "";
                const visibility = {};
                const itemsByPath = new Map();
                const dependentsByPath = new Map();

                loadConfig();

                $("#visibility-search").on("input", renderPanel);
                $("#show-tab").on("click", () => setTabVisibility(true));
                $("#hide-tab").on("click", () => setTabVisibility(false));
                $("#save-config").on("click", saveConfig);

                $("#tab-list").on("click", ".tab-button", function() {
                    activeTab = String($(this).data("tab"));
                    renderTabs();
                    renderPanel();
                });

                $("#config-panel").on("change", ".visibility-input", function() {
                    setVisibility(String($(this).data("path")), this.checked);
                    renderPanel();
                    renderSummary();
                });

                $("#config-panel").on("click", ".group-action", function() {
                    const groupKey = String($(this).data("group"));
                    const nextVisible = String($(this).data("visible")) === "1";
                    const tab = currentTab();
                    const group = tab.groups.find((item) => item.key === groupKey);
                    if (!group) return;
                    group.items.forEach((item) => { setVisibility(item.path, nextVisible); });
                    renderPanel();
                    renderSummary();
                });

                function loadConfig() {
                    $.get(GET_API, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        catalog = res.data;
                        itemsByPath.clear();
                        dependentsByPath.clear();
                        Object.keys(visibility).forEach((path) => { delete visibility[path]; });
                        catalog.tabs.forEach((tab) => tab.groups.forEach((group) => group.items.forEach((item) => {
                            visibility[item.path] = item.visible;
                            itemsByPath.set(item.path, item);
                            item.depends_on_paths.forEach((dependencyPath) => {
                                const dependents = dependentsByPath.get(dependencyPath) || [];
                                dependents.push(item.path);
                                dependentsByPath.set(dependencyPath, dependents);
                            });
                        })));
                        activeTab = catalog.tabs[0]?.key || "";
                        renderTabs();
                        renderPanel();
                        renderSummary();
                    }).fail(function(xhr) {
                        layui.popup.failure(xhr.responseJSON?.msg || "<?=admin_t('admin.game_config_visibility.load_failed')?>");
                    });
                }

                function saveConfig() {
                    if (!catalog) return;
                    const button = $("#save-config");
                    button.prop("disabled", true);
                    $.post(SAVE_API, { visibility_json: JSON.stringify(visibility) }, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        layui.popup.success(TEXT.operation_success, loadConfig);
                    }).fail(function(xhr) {
                        layui.popup.failure(xhr.responseJSON?.msg || "<?=admin_t('admin.game_config_visibility.save_failed')?>");
                    }).always(function() {
                        button.prop("disabled", false);
                    });
                }

                function renderTabs() {
                    if (!catalog) return;
                    $("#tab-list").html(catalog.tabs.map((tab) => `
                        <button type="button" role="tab" aria-selected="${tab.key === activeTab}" class="tab-button ${tab.key === activeTab ? "active" : ""}" data-tab="${escapeHtml(tab.key)}">
                            ${escapeHtml(tab.title)}
                        </button>
                    `).join(""));
                }

                function renderPanel() {
                    const tab = currentTab();
                    if (!tab) return $("#config-panel").html(`<div class="empty">${escapeHtml(TEXT.empty_search)}</div>`);
                    const keyword = String($("#visibility-search").val() || "").trim().toLocaleLowerCase();
                    const groups = tab.groups.map((group) => ({
                        ...group,
                        allItems: group.items,
                        items: group.items.filter((item) => !keyword || `${item.label} ${item.path} ${group.title}`.toLocaleLowerCase().includes(keyword)),
                    })).filter((group) => group.items.length > 0);
                    if (groups.length === 0) {
                        return $("#config-panel").html(`<div class="empty">${escapeHtml(TEXT.empty_search)}</div>`);
                    }
                    $("#config-panel").html(groups.map(renderGroup).join(""));
                }

                function renderGroup(group) {
                    const visibleCount = group.allItems.filter((item) => visibility[item.path]).length;
                    return `
                        <section class="group-card" data-group-card="${escapeHtml(group.key)}">
                            <div class="group-head">
                                <div class="group-title-wrap">
                                    <span class="group-title">${escapeHtml(group.title)}</span>
                                    <span class="group-count">${visibleCount}/${group.allItems.length} ${escapeHtml(TEXT.visible)}</span>
                                </div>
                                <div class="group-actions">
                                    <button type="button" class="group-action" data-group="${escapeHtml(group.key)}" data-visible="1">${escapeHtml(TEXT.show_all)}</button>
                                    <button type="button" class="group-action" data-group="${escapeHtml(group.key)}" data-visible="0">${escapeHtml(TEXT.hide_all)}</button>
                                </div>
                            </div>
                            <div class="item-grid">${group.items.map(renderItem).join("")}</div>
                        </section>
                    `;
                }

                function renderItem(item) {
                    const inputId = `visibility-${item.path.replace(/[^a-zA-Z0-9_-]/g, "-")}`;
                    return `
                        <div class="item-row">
                            <div class="item-main">
                                <label class="item-label" for="${inputId}">
                                    <span>${escapeHtml(item.label)}</span>
                                    ${item.default_visible ? "" : `<span class="default-hidden">${escapeHtml(TEXT.default_hidden)}</span>`}
                                </label>
                                <code class="item-path" title="${escapeHtml(item.path)}">${escapeHtml(item.path)}</code>
                            </div>
                            <label class="switch" title="${escapeHtml(item.label)}">
                                <input id="${inputId}" class="visibility-input" type="checkbox" role="switch" data-path="${escapeHtml(item.path)}" ${visibility[item.path] ? "checked" : ""} aria-label="${escapeHtml(item.label)}">
                                <span class="switch-track" aria-hidden="true"></span>
                            </label>
                        </div>
                    `;
                }

                function renderSummary() {
                    const values = Object.values(visibility);
                    const visibleCount = values.filter(Boolean).length;
                    $("#visible-summary").text(`${TEXT.visible} ${visibleCount}`);
                    $("#hidden-summary").text(`${TEXT.hidden} ${values.length - visibleCount}`);
                }

                function setTabVisibility(nextVisible) {
                    const tab = currentTab();
                    if (!tab) return;
                    tab.groups.forEach((group) => group.items.forEach((item) => { setVisibility(item.path, nextVisible); }));
                    renderPanel();
                    renderSummary();
                }

                function setVisibility(path, nextVisible, visited = new Set()) {
                    if (visited.has(path)) return;
                    visited.add(path);
                    visibility[path] = nextVisible;
                    if (nextVisible) {
                        const item = itemsByPath.get(path);
                        item?.depends_on_paths.forEach((dependencyPath) => setVisibility(dependencyPath, true, visited));
                        (dependentsByPath.get(path) || []).forEach((dependentPath) => setVisibility(dependentPath, true, visited));
                        return;
                    }
                    (dependentsByPath.get(path) || []).forEach((dependentPath) => setVisibility(dependentPath, false, visited));
                }

                function currentTab() {
                    return catalog?.tabs.find((tab) => tab.key === activeTab) || null;
                }

                function escapeHtml(value) {
                    return String(value ?? "").replace(/[&<>'"]/g, (char) => ({
                        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;",
                    }[char]));
                }
            });
        </script>
    </body>
</html>
