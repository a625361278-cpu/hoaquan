<!DOCTYPE html>
<html lang="<?=admin_html_lang()?>">
    <head>
        <meta charset="utf-8">
        <title><?=admin_t('admin.third_party_connection.title')?></title>
        <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css" />
        <link rel="stylesheet" href="/app/admin/admin/css/reset.css" />
        <style>
            .summary-grid {
                display: grid;
                grid-template-columns: repeat(4, minmax(120px, 1fr));
                gap: 12px;
                margin-bottom: 14px;
            }
            .summary-card {
                padding: 14px 16px;
                border-radius: 4px;
                background: #fff;
            }
            .summary-value {
                margin-top: 8px;
                font-size: 26px;
                font-weight: 700;
            }
            .summary-value.small {
                font-size: 14px;
                line-height: 1.5;
                word-break: break-all;
            }
        </style>
    </head>
    <body class="pear-container">
        <div class="summary-grid">
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.online_count')?></div>
                <div id="online-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.idle_count')?></div>
                <div id="idle-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.bound_count')?></div>
                <div id="bound-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.stopping_count')?></div>
                <div id="stopping-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.log_pending_count')?></div>
                <div id="log-pending-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.log_max_shard_pending')?></div>
                <div id="log-max-shard-pending" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.log_writer_count')?></div>
                <div id="log-writer-count" class="summary-value">0</div>
            </div>
            <div class="summary-card">
                <div><?=admin_t('admin.third_party_connection.log_last_flush_at')?></div>
                <div id="log-last-flush-at" class="summary-value small">-</div>
                <div id="log-last-error" class="summary-value small"></div>
            </div>
        </div>

        <div class="layui-card">
            <div class="layui-card-body">
                <table id="data-table" lay-filter="data-table"></table>
            </div>
        </div>

        <script type="text/html" id="table-toolbar">
            <button class="pear-btn pear-btn-md" lay-event="refresh">
                <i class="layui-icon layui-icon-refresh"></i><?=admin_t('admin.common.refresh')?>
            </button>
            <button class="pear-btn pear-btn-md" lay-event="config" permission="app.admin.game-assist-third-party-config.index">
                <i class="layui-icon layui-icon-set"></i><?=admin_t('admin.third_party_config.title')?>
            </button>
        </script>

        <script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
        <script src="/app/admin/component/pear/pear.js"></script>
        <script src="/app/admin/admin/js/permission.js"></script>
        <script src="/app/admin/admin/js/common.js"></script>
        <script>
            const SELECT_API = "/app/admin/game-assist-third-party-connection/select";

            layui.use(["table", "popup", "util"], function() {
                let table = layui.table;
                let $ = layui.$;

                let stateLabels = {
                    idle: "<?=admin_t('admin.third_party_connection.state_idle')?>",
                    bound: "<?=admin_t('admin.third_party_connection.state_bound')?>",
                    stopping: "<?=admin_t('admin.third_party_connection.state_stopping')?>"
                };
                let stateClasses = {
                    idle: "layui-bg-green",
                    bound: "layui-bg-blue",
                    stopping: "layui-bg-orange"
                };

                table.render({
                    elem: "#data-table",
                    url: SELECT_API,
                    page: false,
                    parseData: function(res) {
                        updateSummary(res.summary || {});
                        return res;
                    },
                    cols: [[
                        {title: "client_id", field: "client_id", minWidth: 210},
                        {
                            title: "<?=admin_t('admin.third_party_connection.state')?>",
                            field: "state",
                            width: 120,
                            templet: function (d) {
                                let state = d.state || "idle";
                                let label = stateLabels[state] || state;
                                let cls = stateClasses[state] || "";
                                return '<span class="layui-badge ' + cls + '">' + layui.util.escape(label) + '</span>';
                            }
                        },
                        {title: "<?=admin_t('admin.third_party_connection.account_id')?>", field: "account_id_text", width: 120},
                        {title: "<?=admin_t('admin.third_party_connection.remote_ip')?>", field: "remote_ip", width: 150},
                        {title: "<?=admin_t('admin.third_party_connection.script_version')?>", field: "script_version", width: 150},
                        {title: "<?=admin_t('admin.third_party_connection.connected_at')?>", field: "connected_at_text", width: 170},
                        {title: "<?=admin_t('admin.third_party_connection.last_seen')?>", field: "last_seen_text", width: 170},
                        {title: "<?=admin_t('admin.third_party_connection.last_error')?>", field: "last_error", minWidth: 220}
                    ]],
                    skin: "line",
                    size: "lg",
                    toolbar: "#table-toolbar",
                    defaultToolbar: ["filter", "print", "exports"]
                });

                table.on("toolbar(data-table)", function(obj) {
                    if (obj.event === "refresh") {
                        refreshTable();
                    }
                    if (obj.event === "config") {
                        window.location.href = "/app/admin/game-assist-third-party-config/index";
                    }
                });

                function updateSummary(summary) {
                    $("#online-count").text(summary.online_count || 0);
                    $("#idle-count").text(summary.idle_count || 0);
                    $("#bound-count").text(summary.bound_count || 0);
                    $("#stopping-count").text(summary.stopping_count || 0);
                    let logQueue = summary.log_queue || {};
                    $("#log-pending-count").text(logQueue.total_pending || 0);
                    $("#log-max-shard-pending").text(logQueue.max_shard_pending || 0);
                    $("#log-writer-count").text(logQueue.writer_count || 0);
                    $("#log-last-flush-at").text(logQueue.last_flush_at_text || "-");
                    let lastError = logQueue.last_error || "";
                    $("#log-last-error").text(lastError ? "<?=admin_t('admin.third_party_connection.log_last_error')?>" + "：" + lastError : "");
                }

                window.refreshTable = function() {
                    table.reloadData("data-table", {scrollPos: "fixed"});
                };
            });
        </script>
    </body>
</html>
