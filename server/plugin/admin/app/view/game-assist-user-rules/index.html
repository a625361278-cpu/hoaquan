<!DOCTYPE html>
<html lang="<?=admin_html_lang()?>">
    <head>
        <meta charset="utf-8">
        <title><?=admin_t('admin.user_rules.title')?></title>
        <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css" />
        <link rel="stylesheet" href="/app/admin/admin/css/reset.css" />
        <style>
            .config-card { max-width: 760px; }
            .form-help { margin-top: 6px; color: #6b7280; font-size: 12px; line-height: 1.5; }
        </style>
    </head>
    <body class="pear-container">
        <div class="layui-card config-card">
            <div class="layui-card-body">
                <form class="layui-form" lay-filter="user-rule-config-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.user_rules.registration_reward_points')?></label>
                        <div class="layui-input-block">
                            <input type="number" name="registration_reward_points" min="0" max="1000" step="1" required lay-verify="required|number" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.user_rules.registration_reward_points_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label"><?=admin_t('admin.user_rules.invite_reward_min_role_level')?></label>
                        <div class="layui-input-block">
                            <input type="number" name="invite_reward_min_role_level" min="1" max="9999" step="1" required lay-verify="required|number" autocomplete="off" class="layui-input">
                            <div class="form-help"><?=admin_t('admin.user_rules.invite_reward_min_role_level_help')?></div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="pear-btn pear-btn-primary" lay-submit lay-filter="save-config">
                                <i class="layui-icon layui-icon-ok"></i><?=admin_t('admin.user_rules.save')?>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
        <script src="/app/admin/component/pear/pear.js"></script>
        <script src="/app/admin/admin/js/permission.js"></script>
        <script>
            const GET_API = "/app/admin/game-assist-user-rules/get";
            const SAVE_API = "/app/admin/game-assist-user-rules/save";

            layui.use(["form", "popup"], function() {
                const form = layui.form;
                const $ = layui.$;

                loadConfig();

                form.on("submit(save-config)", function(data) {
                    $.post(SAVE_API, data.field, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        layui.popup.success("<?=admin_t('admin.common.operation_success')?>", loadConfig);
                    });
                    return false;
                });

                function loadConfig() {
                    $.get(GET_API, function(res) {
                        if (res.code) return layui.popup.failure(res.msg);
                        form.val("user-rule-config-form", {
                            registration_reward_points: res.data.registration_reward_points,
                            invite_reward_min_role_level: res.data.invite_reward_min_role_level
                        });
                        form.render();
                    });
                }
            });
        </script>
    </body>
</html>
